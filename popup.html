<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Autofill</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="wrap">
      <div class="title-row">
        <h1>Job Autofill</h1>
        <div class="tabs" role="tablist" aria-label="Popup Sections">
          <button id="tabLogger" class="tab active" type="button">Auto Logger</button>
          <button id="tabProfile" class="tab" type="button">My Info</button>
        </div>
      </div>
      <div class="fill-toggles">
        <label><input id="fillFieldsToggle" type="checkbox" checked /> Fill fields</label>
        <label><input id="uploadResumeToggle" type="checkbox" checked /> Upload resume</label>
      </div>

      <div id="panelLogger" class="panel active">
        <h2>Application Log</h2>
        <div class="grid">
          <label>Company <input id="company" /></label>
          <label
            >Type of Company
            <select id="typeOfCompany">
              <option value=""></option>
              <option value="Tech">Tech</option>
              <option value="Semiconductor">Semiconductor</option>
              <option value="Defense">Defense</option>
              <option value="Aerospace">Aerospace</option>
              <option value="Healthcare">Healthcare</option>
              <option value="Finance">Finance</option>
              <option value="Other">Other</option>
            </select>
          </label>

          <label
            >Application Location
            <select id="applicationLocation">
              <option value=""></option>
              <option value="Company site">Company site</option>
              <option value="Greenhouse">Greenhouse</option>
              <option value="Lever">Lever</option>
              <option value="Workday">Workday</option>
              <option value="Ashby">Ashby</option>
              <option value="LinkedIn">LinkedIn</option>
              <option value="Indeed">Indeed</option>
              <option value="Other">Other</option>
            </select>
          </label>
          <label>Location <input id="location" placeholder="e.g., Austin" /></label>

          <label class="full">Job Title <input id="jobTitle" /></label>
          <label>Salary (k) <input id="salaryK" placeholder="e.g., 120-150" /></label>
          <label>Date Applied <input id="dateApplied" placeholder="M/D/YYYY" /></label>
          <label class="full">URL <input id="url" placeholder="https://..." /></label>
        </div>

        <div class="actions">
          <button id="autofillLogFromTab">Use current tab</button>
          <button id="fillFromLogger">Fill this page</button>
          <button id="logApplication">Log to sheet</button>
        </div>

        <hr />
        <div class="grid">
          <label class="full"
            >Webhook URL
            <input id="sheetWebhookUrl" placeholder="https://script.google.com/macros/s/.../exec" />
          </label>
          <label class="full"
            >Webhook token
            <input id="sheetWebhookToken" type="password" placeholder="Shared token from Apps Script" />
          </label>
        </div>
      </div>

      <div id="panelProfile" class="panel">
        <div class="grid">
          <label>First name <input id="firstName" /></label>
          <label>Last name <input id="lastName" /></label>

          <label class="full">Email <input id="email" type="email" /></label>
          <label class="full">Phone <input id="phone" /></label>

          <label class="full"
            >LinkedIn
            <input id="linkedin" placeholder="https://linkedin.com/in/..."
          /></label>
          <label class="full"
            >GitHub <input id="github" placeholder="https://github.com/..."
          /></label>
          <label class="full"
            >Portfolio <input id="portfolio" placeholder="https://..."
          /></label>

          <label class="full">Address <input id="address" /></label>
          <label class="full">Country <input id="country" /></label>
          <label>City <input id="city" /></label>
          <label>State <input id="state" /></label>
          <label class="full">ZIP <input id="zip" /></label>
          <label class="full">Current title <input id="currentTitle" /></label>
          <label class="full">Current company <input id="currentCompany" /></label>
          <label class="full">Current location <input id="currentLocation" /></label>

          <label class="full"
            >U.S. citizen
            <select id="usCitizen">
              <option value=""></option>
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </label>

          <label class="full"
            >Authorized to work in U.S.
            <select id="workAuthorization">
              <option value=""></option>
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </label>

          <label class="full"
            >Need visa sponsorship
            <select id="requireSponsorship">
              <option value=""></option>
              <option value="No">No</option>
              <option value="Yes">Yes</option>
            </select>
          </label>

          <label class="full"
            >Start date availability
            <input id="startDateAvailability" placeholder="e.g., 2 weeks notice or 2026-04-01" />
          </label>

          <label class="full"
            >Willing to relocate
            <select id="willingToRelocate">
              <option value=""></option>
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </label>

          <label class="full"
            >Willing to travel
            <select id="willingToTravel">
              <option value=""></option>
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </label>

          <label class="full"
            >Gender
            <select id="gender">
              <option value=""></option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
              <option value="Non-binary">Non-binary</option>
              <option value="Prefer not to say">Prefer not to say</option>
            </select>
          </label>

          <label class="full"
            >Race / Ethnicity
            <select id="raceEthnicity">
              <option value=""></option>
              <option value="White">White</option>
              <option value="Black or African American">Black or African American</option>
              <option value="Hispanic or Latino">Hispanic or Latino</option>
              <option value="Asian">Asian</option>
              <option value="American Indian or Alaska Native">American Indian or Alaska Native</option>
              <option value="Native Hawaiian or Other Pacific Islander">Native Hawaiian or Other Pacific Islander</option>
              <option value="Two or more races">Two or more races</option>
              <option value="Prefer not to say">Prefer not to say</option>
            </select>
          </label>

          <label class="full"
            >Disability status
            <select id="disabilityStatus">
              <option value=""></option>
              <option value="No">No, I do not have a disability</option>
              <option value="Yes">Yes, I have a disability</option>
              <option value="Prefer not to say">Prefer not to say</option>
            </select>
          </label>

          <label class="full"
            >Veteran status
            <select id="veteranStatus">
              <option value=""></option>
              <option value="No">No, I am not a protected veteran</option>
              <option value="Yes">Yes, I am a protected veteran</option>
              <option value="Prefer not to say">Prefer not to say</option>
            </select>
          </label>

          <label class="full">School <input id="school" /></label>
          <label class="full">Degree <input id="degree" /></label>
          <label class="full">Major <input id="major" /></label>
          <label>Grad month <input id="gradMonth" placeholder="MM or month" /></label>
          <label>Grad year <input id="gradYear" placeholder="YYYY" /></label>
          <label class="full"
            >Security clearance
            <select id="securityClearance">
              <option value=""></option>
              <option value="None">None</option>
              <option value="Public Trust">Public Trust</option>
              <option value="Confidential">Confidential</option>
              <option value="Secret">Secret</option>
              <option value="Top Secret">Top Secret</option>
              <option value="TS/SCI">TS/SCI</option>
            </select>
          </label>

          <label class="full"
            >GPA <input id="gpa" placeholder="e.g., 3.72"
          /></label>

          <label class="full"
            >Short summary (1–3 sentences)
            <textarea
              id="summary"
              rows="3"
              placeholder="Quick professional summary..."
            ></textarea>
          </label>

          <label class="full"
            >Cover letter (full text)
            <textarea
              id="coverLetter"
              rows="6"
              placeholder="Full reusable cover letter..."
            ></textarea>
          </label>

          <label class="full"
            >Resume file (PDF/DOC/DOCX)
            <input
              id="resumeFile"
              type="file"
              accept=".pdf,.doc,.docx,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document"
            />
            <small class="small">
              Stored locally in this browser. Some sites may still require manual
              upload.
            </small>
          </label>
        </div>

        <div class="actions">
          <button id="save">Save</button>
          <button id="fill">Fill this page</button>
        </div>
      </div>

      <p class="hint">
        Note: CAPTCHAs / “Are you human?” steps can’t be automated reliably.
      </p>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
